<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05000a" />
<title>Professor VPN — دانلود</title>
<meta name="description" content="آخرین نسخه Professor VPN را دریافت کنید." />
<link rel="icon" href="/icon.png" />
<link rel="apple-touch-icon" href="/icon.png" />
<style>
:root{
  --bg:#05000a;
  --bg2:#0a0512;
  --violet:#a83aff;
  --violet-hi:#c77bff;
  --violet-deep:#7a1aff;
  --violet-dark:#4f0980;
  --magenta:#e635ff;
  --silver:#dcdde1;
  --silver-2:#8f949a;
  --text:#efe6ff;
  --muted:#9a7fce;
  --glass:rgba(168,58,255,.07);
  --ring:rgba(168,58,255,.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif;
  background:radial-gradient(120% 120% at 50% 0%,#0d0518 0%,var(--bg) 60%,#020006 100%);
  color:var(--text);
  overflow-x:hidden;
  min-height:100dvh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

/* ---------- animated background ---------- */
.bg-glow{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.5;animation:float 16s ease-in-out infinite}
.orb.p1{width:520px;height:520px;background:var(--violet-deep);top:-160px;right:-140px}
.orb.p2{width:440px;height:440px;background:var(--violet-dark);bottom:-180px;left:-140px;animation-delay:-6s;opacity:.55}
.orb.p3{width:380px;height:380px;background:var(--magenta);top:42%;left:50%;transform:translate(-50%,-50%);animation-delay:-10s;opacity:.22}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(34px,-42px) scale(1.08)}
  66%{transform:translate(-28px,28px) scale(.94)}
}

/* dotted world-map style grid + circuit feel */
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(rgba(168,58,255,.28) 1px,transparent 1.4px);
  background-size:20px 20px;
  mask-image:radial-gradient(circle at 50% 38%,#000 0%,transparent 72%);
  -webkit-mask-image:radial-gradient(circle at 50% 38%,#000 0%,transparent 72%);
}
/* circuit trace lines */
.circuit{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.22;
  background:
    linear-gradient(90deg,transparent 0 48%,rgba(168,58,255,.5) 48% 49%,transparent 49%),
    linear-gradient(0deg,transparent 0 70%,rgba(168,58,255,.35) 70% 71%,transparent 71%);
  background-size:180px 100%,100% 240px;
  mask-image:radial-gradient(circle at 50% 45%,transparent 30%,#000 100%);
  -webkit-mask-image:radial-gradient(circle at 50% 45%,transparent 30%,#000 100%);
}
.scanline{
  position:fixed;left:0;right:0;height:2px;z-index:0;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--violet),transparent);
  opacity:.35;animation:scan 8s linear infinite;
}
@keyframes scan{0%{top:-5%}100%{top:105%}}
#fx{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ---------- card ---------- */
.wrap{position:relative;z-index:2;width:100%;max-width:440px;animation:rise .8s cubic-bezier(.2,.8,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

.card{
  position:relative;
  background:linear-gradient(160deg,rgba(18,6,32,.94),rgba(6,2,14,.96));
  border:1px solid rgba(168,58,255,.26);
  border-radius:32px;
  padding:34px 24px 26px;
  backdrop-filter:blur(16px);
  box-shadow:0 0 1px rgba(168,58,255,.6),
             0 24px 80px rgba(79,9,128,.42),
             0 0 120px rgba(168,58,255,.12) inset;
  overflow:hidden;
}
.card::before{
  content:"";position:absolute;inset:0;border-radius:32px;padding:1px;
  background:linear-gradient(130deg,var(--violet),transparent 30%,transparent 70%,var(--violet-deep));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.8;pointer-events:none;animation:borderPulse 4.5s ease-in-out infinite;
}
@keyframes borderPulse{0%,100%{opacity:.45}50%{opacity:.95}}

/* logo inside neon ring (matches the circular ring in the logo) */
.logo{
  width:184px;height:184px;margin:0 auto 20px;position:relative;
  display:flex;align-items:center;justify-content:center;
  animation:bob 6s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo .ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,var(--violet-deep),var(--magenta),var(--violet),var(--violet-dark),var(--violet-deep));
  filter:blur(9px);opacity:.85;animation:spin 12s linear infinite;
}
.logo .ring::after{
  content:"";position:absolute;inset:6px;border-radius:50%;background:var(--bg);
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo .disc{
  position:relative;width:158px;height:158px;border-radius:50%;overflow:hidden;
  border:2px solid rgba(199,123,255,.55);
  box-shadow:0 0 34px rgba(168,58,255,.6),0 0 60px rgba(79,9,128,.5),inset 0 0 24px rgba(0,0,0,.6);
  background:#05000a;
}
.logo .disc img{width:100%;height:100%;object-fit:cover;display:block}

.title{
  text-align:center;font-size:32px;font-weight:900;letter-spacing:1px;
  background:linear-gradient(92deg,#ffffff,var(--silver) 30%,var(--violet-hi) 70%,var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 26px rgba(168,58,255,.4);
  filter:drop-shadow(0 2px 10px rgba(122,26,255,.4));
}
.subtitle{text-align:center;color:var(--muted);font-size:12px;margin-top:7px;letter-spacing:3px;font-weight:600}

/* connection status + signal bars (purple theme) */
.conn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:12px;color:var(--violet-hi);letter-spacing:.5px}
.conn .pulse{width:9px;height:9px;border-radius:50%;background:var(--violet);box-shadow:0 0 12px var(--violet);animation:blink 1.3s infinite}
.signal{display:flex;align-items:flex-end;gap:4px;height:18px;margin-inline-start:4px}
.signal i{width:4px;border-radius:3px;background:linear-gradient(to top,var(--violet-deep),var(--magenta));box-shadow:0 0 6px rgba(230,53,255,.6);animation:wave 1.4s ease-in-out infinite}
.signal i:nth-child(1){height:35%}.signal i:nth-child(2){height:55%;animation-delay:.15s}
.signal i:nth-child(3){height:78%;animation-delay:.3s}.signal i:nth-child(4){height:100%;animation-delay:.45s}
@keyframes wave{0%,100%{transform:scaleY(.55)}50%{transform:scaleY(1.1)}}

/* connection status + signal bars */
.conn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:12px;color:#7dffc0;letter-spacing:.5px}
.conn .pulse{width:9px;height:9px;border-radius:50%;background:#23ff9c;box-shadow:0 0 12px #23ff9c;animation:blink 1.3s infinite}
.signal{display:flex;align-items:flex-end;gap:4px;height:18px;margin-inline-start:4px}
.signal i{width:4px;border-radius:3px;background:linear-gradient(to top,var(--purple),var(--magenta));box-shadow:0 0 6px rgba(230,53,255,.6);animation:wave 1.4s ease-in-out infinite}
.signal i:nth-child(1){height:35%}.signal i:nth-child(2){height:55%;animation-delay:.15s}
.signal i:nth-child(3){height:78%;animation-delay:.3s}.signal i:nth-child(4){height:100%;animation-delay:.45s}
@keyframes wave{0%,100%{transform:scaleY(.55)}50%{transform:scaleY(1.1)}}

.badges{display:flex;gap:10px;justify-content:center;margin:20px 0 22px;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:13px;font-weight:700;padding:9px 15px;border-radius:14px;
  background:var(--glass);border:1px solid rgba(168,58,255,.3);
  color:var(--text);
}
.badge .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);
  box-shadow:0 0 10px var(--violet);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.35}}
.badge.ver{color:#fff;border-color:rgba(168,58,255,.6);
  background:linear-gradient(100deg,rgba(122,26,255,.25),rgba(168,58,255,.15))}
.badge svg{width:15px;height:15px}

/* download button */
.btn{
  position:relative;display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;border:none;cursor:pointer;
  font-family:inherit;font-size:18px;font-weight:900;color:#fff;
  border-radius:18px;overflow:hidden;letter-spacing:.5px;
  background:linear-gradient(100deg,var(--violet-deep),var(--magenta));
  box-shadow:0 0 26px rgba(168,58,255,.55),0 0 46px rgba(122,26,255,.4);
  transition:transform .15s,box-shadow .25s;
}
.btn:active{transform:scale(.97)}
.btn:hover{box-shadow:0 0 40px rgba(230,53,255,.7),0 0 70px rgba(122,26,255,.55)}
.btn::after{
  content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.55),transparent);
  transform:skewX(-20deg);animation:sheen 3.4s infinite;
}
@keyframes sheen{0%{left:-60%}55%,100%{left:140%}}
.btn[disabled]{opacity:.6;cursor:wait}
.btn svg{width:22px;height:22px}

/* progress */
.progress-wrap{margin-top:16px;display:none}
.progress-wrap.show{display:block;animation:rise .4s both}
.bar{height:12px;border-radius:10px;background:rgba(168,58,255,.14);overflow:hidden;border:1px solid rgba(168,58,255,.32)}
.bar > i{display:block;height:100%;width:0%;border-radius:10px;
  background:linear-gradient(90deg,var(--violet-deep),var(--magenta));
  box-shadow:0 0 14px var(--violet);transition:width .25s}
.pinfo{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px}

.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:22px;line-height:1.9;opacity:.85}
.foot b{color:var(--violet-hi)}

.note{
  margin-top:14px;text-align:center;font-size:12px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.shield{width:14px;height:14px;fill:var(--violet)}

@media (max-width:400px){
  .title{font-size:27px}.card{padding:28px 18px 22px}
  .logo{width:160px;height:160px}.logo .disc{width:138px;height:138px}
}
</style>
</head>
<body>
  <div class="bg-glow">
    <div class="orb p1"></div><div class="orb p2"></div><div class="orb p3"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="circuit"></div>
  <div class="scanline"></div>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <div class="card">
      <div class="logo">
        <div class="ring"></div>
        <div class="disc"><img src="/icon.png" alt="Professor VPN" /></div>
      </div>

      <h1 class="title">Professor VPN</h1>
      <div class="subtitle">SECURE · FAST · ANONYMOUS</div>

      <div class="conn">
        <span class="pulse"></span>
        <span>اتصال امن برقرار است</span>
        <span class="signal"><i></i><i></i><i></i><i></i></span>
      </div>

      <div class="badges">
        <span class="badge ver" id="verBadge"><span class="dot"></span>v<span id="ver">…</span></span>
        <span class="badge" id="sizeBadge">…</span>
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="var(--violet)"><path d="M6 18a1 1 0 0 0 1 1h1v3.5a1.5 1.5 0 0 0 3 0V19h2v3.5a1.5 1.5 0 0 0 3 0V19h1a1 1 0 0 0 1-1V8H6v10zM3.5 8A1.5 1.5 0 0 0 2 9.5v7a1.5 1.5 0 0 0 3 0v-7A1.5 1.5 0 0 0 3.5 8zm17 0A1.5 1.5 0 0 0 19 9.5v7a1.5 1.5 0 0 0 3 0v-7A1.5 1.5 0 0 0 20.5 8zM15.53 2.16l1.3-1.3a.25.25 0 0 0-.35-.36l-1.48 1.48A6.03 6.03 0 0 0 12 1.5c-1.05 0-2.03.27-2.9.75L7.63.5a.25.25 0 1 0-.35.36l1.3 1.3A5.99 5.99 0 0 0 6 7h12a5.99 5.99 0 0 0-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>
          Android
        </span>
      </div>

      <button class="btn" id="dlBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span id="btnText">دانلود آخرین نسخه</span>
      </button>

      <div class="progress-wrap" id="prog">
        <div class="bar"><i id="barFill"></i></div>
        <div class="pinfo"><span id="pPct">0%</span><span id="pInfo">آماده‌سازی…</span></div>
      </div>

      <div class="note">
        <svg class="shield" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3z"/></svg>
        دانلود امن و بهینه برای اینترنت ضعیف
      </div>

      <div class="foot">
        به‌روزرسانی خودکار آخرین نسخه · <b id="updated">آنلاین</b>
      </div>
    </div>
  </div>

<script>
const $ = (id)=>document.getElementById(id);
let META = null;

async function loadVersion(){
  try{
    const r = await fetch('/api/version',{cache:'no-store'});
    const d = await r.json();
    if(!d.ok) throw 0;
    META = d;
    $('ver').textContent = d.version;
    $('sizeBadge').textContent = d.sizeText || '';
    $('updated').textContent = 'نسخه فعلی: v'+d.version;
    document.title = d.name + ' v' + d.version + ' — دانلود';
  }catch(e){
    $('ver').textContent = '—';
    $('sizeBadge').textContent = 'آفلاین';
    $('updated').textContent = 'اتصال دوباره…';
    setTimeout(loadVersion, 4000);
  }
}

async function download(){
  if(!META){ await loadVersion(); if(!META) return; }
  const btn = $('dlBtn'), prog = $('prog'), fill = $('barFill');
  btn.disabled = true; $('btnText').textContent = 'در حال دانلود…';
  prog.classList.add('show');
  $('pInfo').textContent = 'اتصال به سرور…';

  const fileName = META.fileName;
  const path = META.downloadPath;

  try{
    const resp = await fetch(path, {cache:'no-store'});
    if(!resp.ok) throw new Error('net');
    const total = +(resp.headers.get('Content-Length')) || META.size || 0;
    const reader = resp.body.getReader();
    const chunks = []; let received = 0;

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      chunks.push(value); received += value.length;
      if(total){
        const pct = Math.min(100, Math.round(received/total*100));
        fill.style.width = pct+'%';
        $('pPct').textContent = pct+'%';
        $('pInfo').textContent = fmt(received)+' / '+fmt(total);
      }else{
        $('pInfo').textContent = fmt(received);
      }
    }

    const blob = new Blob(chunks,{type:'application/vnd.android.package-archive'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 4000);

    fill.style.width='100%'; $('pPct').textContent='100%';
    $('pInfo').textContent='دانلود کامل شد ✓';
    $('btnText').textContent='دانلود دوباره';
  }catch(e){
    $('pInfo').textContent='ادامه با مرورگر…';
    const a=document.createElement('a');
    a.href=path; a.download=fileName; document.body.appendChild(a); a.click(); a.remove();
    $('btnText').textContent='دانلود دوباره';
  }finally{
    btn.disabled = false;
  }
}

function fmt(b){
  const mb=b/1048576;
  return mb>=1 ? mb.toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';
}

$('dlBtn').addEventListener('click', download);
loadVersion();
setInterval(loadVersion, 300000);

/* ---------- floating neon particles ---------- */
(function(){
  const c = $('fx'); if(!c) return;
  const x = c.getContext('2d');
  let w,h,ps; const dpr = Math.min(window.devicePixelRatio||1, 2);
  const COLORS = ['#a855f7','#e635ff','#ff0040'];
  const N = window.innerWidth < 600 ? 26 : 46;
  function size(){ w=c.width=innerWidth*dpr; h=c.height=innerHeight*dpr; }
  function seed(){ ps = Array.from({length:N}, ()=>({
    x:Math.random()*w, y:Math.random()*h,
    r:(Math.random()*1.7+.5)*dpr,
    vx:(Math.random()-.5)*.22*dpr, vy:(Math.random()-.5)*.22*dpr,
    col:COLORS[(Math.random()*COLORS.length)|0], a:Math.random()*.5+.2
  })); }
  function tick(){
    x.clearRect(0,0,w,h);
    for(const p of ps){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
      x.globalAlpha=p.a; x.fillStyle=p.col;
      x.shadowBlur=9*dpr; x.shadowColor=p.col;
      x.beginPath(); x.arc(p.x,p.y,p.r,0,6.283); x.fill();
    }
    x.globalAlpha=1; requestAnimationFrame(tick);
  }
  size(); seed(); tick();
  addEventListener('resize', ()=>{ size(); seed(); });
})();
</script>
</body>
</html>
