<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08060f" />
  <title>Professor VPN — دانلود</title>
  <meta name="description" content="دانلود مستقیم Professor VPN" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="assets/app-icon.png" />
  <link rel="apple-touch-icon" href="assets/app-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- پس‌زمینه نئونی متحرک -->
  <div class="bg-layer" aria-hidden="true">
    <div class="grid-floor"></div>
    <div class="orb orb--purple"></div>
    <div class="orb orb--red"></div>
    <div class="orb orb--magenta"></div>
    <canvas id="particles"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <!-- نویز ظریف -->
  <div class="noise" aria-hidden="true"></div>

  <main class="stage">
    <!-- نشان بالا -->
    <div class="topbadge reveal" data-delay="0">
      <span class="dot"></span>
      <span>اتصال امن • بدون محدودیت</span>
    </div>

    <section class="hero">
      <!-- موکاپ گوشی موبایل -->
      <div class="phone reveal" data-delay="120">
        <div class="phone__glow"></div>
        <div class="phone__frame">
          <div class="phone__notch"></div>
          <div class="phone__screen">
            <div class="screen-glow"></div>
            <div class="app-icon-wrap">
              <div class="icon-rings">
                <span></span><span></span><span></span>
              </div>
              <img src="assets/app-icon.png" alt="Professor VPN" class="app-icon" />
            </div>
            <div class="screen-name">Professor VPN</div>
            <div class="screen-status">
              <span class="pulse-dot"></span>
              <span data-i18n="protected">محافظت فعال</span>
            </div>
            <div class="screen-bars">
              <i style="--h:40%"></i><i style="--h:70%"></i><i style="--h:55%"></i>
              <i style="--h:90%"></i><i style="--h:65%"></i><i style="--h:80%"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- محتوای متنی + دکمه دانلود -->
      <div class="info">
        <h1 class="title reveal" data-delay="180">
          <span class="title__line">Professor</span>
          <span class="title__line title__line--accent">VPN</span>
        </h1>

        <div class="version-pill reveal" data-delay="260">
          <span class="version-pill__tag">نسخه</span>
          <span class="version-pill__num" id="versionText">…</span>
          <span class="version-pill__live" id="liveBadge" title="به‌روزرسانی خودکار">
            <span class="live-dot"></span>LIVE
          </span>
        </div>

        <div class="meta reveal" data-delay="320">
          <div class="meta__item">
            <svg viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>
            <span>امن و رمزنگاری‌شده</span>
          </div>
          <div class="meta__item">
            <svg viewBox="0 0 24 24"><path d="M7 18a5 5 0 01-1-9.9A6 6 0 0118 9a4 4 0 01-1 7.9"/><path d="M12 11v6m0 0l-2.5-2.5M12 17l2.5-2.5"/></svg>
            <span id="sizeText">— مگابایت</span>
          </div>
          <div class="meta__item">
            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 0v10l6 3"/></svg>
            <span>اندروید ۷ به بالا</span>
          </div>
        </div>

        <!-- دکمه دانلود -->
        <button id="downloadBtn" class="dl-btn reveal" data-delay="380">
          <span class="dl-btn__shine"></span>
          <span class="dl-btn__content">
            <svg class="dl-icon" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
            <span class="dl-btn__text">دانلود مستقیم</span>
          </span>
          <span class="dl-btn__progress" id="btnProgress"></span>
        </button>

        <!-- وضعیت دانلود -->
        <div class="dl-status" id="dlStatus" hidden>
          <div class="dl-status__bar">
            <div class="dl-status__fill" id="dlFill"></div>
          </div>
          <div class="dl-status__row">
            <span id="dlPercent">۰٪</span>
            <span id="dlSpeed"></span>
            <span id="dlSize"></span>
          </div>
          <div class="dl-status__hint" id="dlHint">در حال آماده‌سازی…</div>
        </div>

        <div class="subnote reveal" data-delay="440">
          <span class="shield-mini"></span>
          دانلود از مسیر امن • مقاوم در برابر قطعی و فیلتر
        </div>
      </div>
    </section>

    <footer class="foot reveal" data-delay="520">
      <span>© Professor VPN</span>
      <span class="foot__sep">•</span>
      <span id="updatedAt">به‌روزرسانی خودکار</span>
    </footer>
  </main>

  <!-- تُست‌نوتیفیکیشن -->
  <div class="toast" id="toast"></div>

  <script src="app.js" defer></script>
</body>
</html>
